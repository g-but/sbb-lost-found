apiVersion: v1
kind: Secret
metadata:
  name: reporting-service-secret
  namespace: sbb-lost-found
type: Opaque
data:
  # Base64 encode your values: echo -n "value" | base64
  DATABASE_URL: REPLACE_WITH_BASE64_ENCODED_DATABASE_URL
  REDIS_URL: REPLACE_WITH_BASE64_ENCODED_REDIS_URL
  JWT_SECRET: REPLACE_WITH_BASE64_ENCODED_JWT_SECRET

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reporting-service
  namespace: sbb-lost-found
  labels:
    app: reporting-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: reporting-service
  template:
    metadata:
      labels:
        app: reporting-service
    spec:
      containers:
      - name: reporting-service
        image: sbb-lost-found/reporting-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3001"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: reporting-service-secret
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: reporting-service-secret
              key: REDIS_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: reporting-service-secret
              key: JWT_SECRET
        - name: LOG_LEVEL
          value: "info"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
      initContainers:
      - name: wait-for-postgres
        image: postgres:15-alpine
        command:
          - sh
          - -c
          - |
            until pg_isready -h postgres -U postgres; do
              echo "Waiting for postgres..."
              sleep 2
            done
      - name: wait-for-redis
        image: redis:7-alpine
        command:
          - sh
          - -c
          - |
            until redis-cli -h redis ping; do
              echo "Waiting for redis..."
              sleep 2
            done

---
apiVersion: v1
kind: Service
metadata:
  name: reporting-service
  namespace: sbb-lost-found
  labels:
    app: reporting-service
spec:
  type: ClusterIP
  ports:
  - port: 3001
    targetPort: 3001
    protocol: TCP
    name: http
  selector:
    app: reporting-service

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: reporting-service-hpa
  namespace: sbb-lost-found
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: reporting-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80