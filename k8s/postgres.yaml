apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: sbb-lost-found
type: Opaque
data:
  # Base64 encode your values: echo -n "value" | base64
  POSTGRES_DB: REPLACE_WITH_BASE64_ENCODED_DB_NAME
  POSTGRES_USER: REPLACE_WITH_BASE64_ENCODED_USERNAME
  POSTGRES_PASSWORD: REPLACE_WITH_BASE64_ENCODED_PASSWORD

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: sbb-lost-found
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: fast-ssd

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: sbb-lost-found
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        - name: postgres-init
          mountPath: /docker-entrypoint-initdb.d
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2"
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
      - name: postgres-init
        configMap:
          name: postgres-init-scripts

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: sbb-lost-found
data:
  01-schema.sql: |
    -- SBB Lost and Found Database Schema
    -- Optimized for high-scale operations across Swiss public transport

    -- Extensions
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS "pg_trgm";

    -- Enums
    CREATE TYPE item_category AS ENUM (
        'electronics', 'clothing', 'bags', 'documents', 'jewelry',
        'books', 'toys', 'sports_equipment', 'medical', 'other'
    );

    CREATE TYPE item_status AS ENUM (
        'reported_lost', 'reported_found', 'matched', 'returned', 'disposed'
    );

    CREATE TYPE transport_type AS ENUM (
        'train', 'bus', 'tram', 'funicular', 'cable_car', 'boat'
    );

    CREATE TYPE match_status AS ENUM (
        'pending', 'confirmed', 'rejected', 'expired'
    );

    -- Tables and indexes will be created here (truncated for brevity)
    -- Full schema available in database/init/01-schema.sql

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: sbb-lost-found
  labels:
    app: postgres
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
  selector:
    app: postgres