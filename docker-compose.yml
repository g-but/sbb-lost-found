version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: sbb_lost_found
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  reporting-service:
    build:
      context: .
      dockerfile: services/reporting/Dockerfile
    ports:
      - "${REPORTING_PORT:-3001}:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sbb_lost_found
      REDIS_URL: redis://redis:6379
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/reporting:/app
      - /app/node_modules

  matching-service:
    build:
      context: .
      dockerfile: services/matching/Dockerfile
    ports:
      - "${MATCHING_PORT:-3002}:3002"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sbb_lost_found
      REDIS_URL: redis://redis:6379
      PORT: 3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: services/notification/Dockerfile
    ports:
      - "${NOTIFICATION_PORT:-3003}:3003"
    environment:
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
      PORT: 3003
    depends_on:
      redis:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      DEMO_MODE: "true"
      REPORTING_SERVICE_URL: http://reporting-service:3001
      MATCHING_SERVICE_URL: http://matching-service:3002
      NOTIFICATION_SERVICE_URL: http://notification-service:3003
      PORT: 3000
    depends_on:
      - reporting-service
      - matching-service
      - notification-service

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3004}:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_WS_URL: ws://localhost:3003
      NEXT_PUBLIC_DEMO_MODE: "true"
    depends_on:
      - api-gateway
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  redis_data:
